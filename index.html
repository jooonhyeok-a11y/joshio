<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lexio Online</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

  <div id="round-modal" style="display: none;">
    <div class="modal-box">
      <h2 id="modal-title">라운드 종료</h2>
      <h3 id="modal-winner-announce" style="display:none;"></h3>
      <div id="modal-round-details">
        <div id="modal-my-tiles" style="margin-bottom:15px; line-height:1.4;">내 남은 타일: 0개</div>
        <div id="modal-exchanges"></div>
        <div id="modal-total-change">나의 코인 변동: +0개</div>
      </div>
      <div id="modal-final-rankings" style="display:none;"></div>
      <div id="modal-current-coins">💰 내가 가진 코인: 64개</div>
      <button id="modal-confirm-btn">확인 (다음 라운드 대기)</button>
    </div>
  </div>

  <div id="lobby">
    <h1>렉시오 온라인 ☀️</h1>
    <div class="lobby-section stats-section">
      <h3>🏆 내 기록 (자동 저장)</h3>
      <p id="stats-display">누적 승리: 0회 | 최고 자산: 0개</p>
    </div>
    
    <div class="lobby-section">
      <h3>계정 로그인 및 복귀</h3>
      <input type="text" id="nicknameInput" placeholder="닉네임 입력 (필수)">
      <input type="password" id="passwordInput" placeholder="비밀번호 (전적/재접속 보호용)">
      <button id="loginRejoinBtn" style="background-color: #4ade80; border: 2px solid #16a34a; margin-top: 5px; color: #000;">로그인 / 진행 중인 게임 복귀</button>
    </div>
    
    <div class="lobby-section">
      <h3>입장 가능한 방</h3>
      <ul id="roomList"></ul>
    </div>
    <div class="lobby-section">
      <h3>새 방 만들기</h3>
      <input type="text" id="roomNameInput" placeholder="방 제목">
      <select id="playerCountSelect">
        <option value="3">3인 플레이</option>
        <option value="4" selected>4인 플레이</option>
        <option value="5">5인 플레이</option>
      </select>
      <button id="createRoomBtn">방 만들기</button>
    </div>
  </div>

  <div id="game-board" style="display: none;">
    <div class="bg-emoji" style="top: 10%;">☀️</div>
    <div class="bg-emoji" style="top: 30%;">🌙</div>
    <div class="bg-emoji" style="top: 50%;">⭐</div>
    <div class="bg-emoji" style="top: 70%;">☁️</div>

    <div id="combo-text">대기중</div>
    <div id="last-played-name"></div>
    <div id="center-field"></div>
    <div id="opponents"></div>

    <div id="top-right-ui">
      <div id="hand-ranking-guide">
        <div>1. 스트레이트</div>
        <div>2. 플러시</div>
        <div>3. 풀하우스</div>
        <div>4. 포카드</div>
        <div>5. 스티플</div>
      </div>
      <div id="round-indicator-text">1 / 5 ROUND</div>
      <div id="my-coins-display">💰 64</div>
    </div>

    <div id="chat-container">
      <div id="chat-messages"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="채팅...">
        <button id="sendChatBtn">전송</button>
      </div>
    </div>

    <div class="controls">
      <button id="playBtn">조합 내기</button>
      <button id="passBtn">패스</button>
    </div>
    
    <div id="my-area">
      <button id="toggleSortBtn">카드정렬 ↔️</button>
      <div class="info-bar">
        <div id="combo-guide">선택한 카드: 없음</div>
        <div id="my-turn-indicator">내 턴이 아닙니다</div>
      </div>
      <div id="my-hand"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
