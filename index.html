<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Lexio Online</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

  <!-- 라운드 종료 정산 모달창 (신규) -->
  <div id="round-modal" style="display: none;">
    <div class="modal-box">
      <h2 id="modal-title">라운드 종료</h2>
      <div id="modal-my-tiles">내 남은 타일: 0개</div>
      
      <!-- 상호 교환 상세 내역 -->
      <div id="modal-exchanges"></div>
      
      <div id="modal-total-change">나의 코인 변동: +0개</div>
      <div id="modal-current-coins"><span class="gold-coin">C</span> 내가 가진 코인: 64개</div>
      <button id="modal-confirm-btn">확인</button>
    </div>
  </div>

  <div id="lobby">
    <h1>렉시오 온라인 ☀️</h1>
    <div class="lobby-section stats-section">
      <h3>🏆 내 기록</h3>
      <p id="stats-display">누적 승리: 0회 | 최고 코인: 0개</p>
    </div>
    <div class="lobby-section">
      <h3>내 정보</h3>
      <input type="text" id="nicknameInput" placeholder="사용할 닉네임 입력 (필수)">
    </div>
    <div class="lobby-section">
      <h3>입장 가능한 방</h3>
      <ul id="roomList"></ul>
    </div>
    <div class="lobby-section">
      <h3>새 방 만들기</h3>
      <input type="text" id="roomNameInput" placeholder="방 제목">
      <select id="playerCountSelect">
        <option value="3">3인 플레이 (1~9 사용)</option>
        <option value="4" selected>4인 플레이 (1~13 사용)</option>
        <option value="5">5인 플레이 (1~15 사용)</option>
      </select>
      <button id="createRoomBtn">방 만들기</button>
    </div>
  </div>

  <div id="game-board" style="display: none;">
    <div class="bg-emoji" style="top: 5%;">☀️</div>
    <div class="bg-emoji" style="top: 30%;">🌙</div>
    <div class="bg-emoji" style="top: 55%;">⭐</div>
    <div class="bg-emoji" style="top: 80%;">☁️</div>

    <div id="combo-text">대기중</div>
    <div id="center-field"></div>
    <div id="opponents"></div>
    
    <div id="system-log-container">
      <div id="system-logs"></div>
    </div>
    <div id="hand-ranking-guide">
      <div>1. 스트레이트</div>
      <div>2. 플러시</div>
      <div>3. 풀하우스</div>
      <div>4. 포카드</div>
      <div>5. 스티플</div>
    </div>

    <div id="chat-container">
      <div id="chat-messages"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="채팅 입력...">
        <button id="sendChatBtn">전송</button>
      </div>
    </div>

    <div class="controls">
      <button id="playBtn">조합 내기</button>
      <button id="passBtn">패스</button>
    </div>
    
    <div id="my-area">
      <button id="toggleSortBtn">🔀 현재: 숫자순</button>
      <div class="info-bar">
        <!-- 현재 라운드 표시기 (신규) -->
        <div id="round-indicator-text">현재 라운드: 1 / 5</div>
        <div id="combo-guide">선택한 카드: 없음</div>
        <div id="my-coins-display"><span class="gold-coin">C</span> 내 코인: 64</div>
        <div id="my-turn-indicator">내 턴이 아닙니다</div>
      </div>
      <div id="my-hand"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
