<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lexio Online</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>

  <!-- 로비 화면 -->
  <div id="lobby">
    <h1>렉시오 온라인</h1>
    <input type="text" id="nicknameInput" placeholder="닉네임 입력">
    <input type="text" id="roomInput" placeholder="방 이름 입력 (예: room1)" value="room1">
    <button id="joinBtn">게임 입장</button>
  </div>

  <!-- 게임 화면 -->
  <div id="game-board" style="display: none;">
    <!-- 4단 배경 (CSS로 구현) -->
    
    <!-- 중앙 족보 텍스트 -->
    <div id="combo-text">대기중</div>

    <!-- 중앙 필드 (내려놓은 패) -->
    <div id="center-field"></div>

    <!-- 상대방 UI (간단히 이름과 남은 카드 수 표기) -->
    <div id="opponents"></div>

    <!-- 내 패 UI -->
    <div id="my-area">
      <div id="my-turn-indicator">내 턴이 아닙니다</div>
      <div id="my-hand"></div>
      <div class="controls">
        <button id="passBtn">패스</button>
        <button id="playBtn">조합 내기</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
